name: Validate config.json

on:
  push:
    paths:
      - "config.json"
      - "validate_config.py"
      - ".github/workflows/validate-config.yml"
  pull_request:
    paths:
      - "config.json"
      - "validate_config.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate config.json
        run: python3 validate_config.py
